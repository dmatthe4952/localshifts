services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: volunteerflow
      POSTGRES_USER: volunteerflow
      POSTGRES_PASSWORD: volunteerflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      APP_ENV: staging
      APP_PORT: 3000
      APP_URL: https://volunteerflow.example.com
      APP_TIMEZONE: America/New_York
      DATABASE_URL: postgres://volunteerflow:volunteerflow_password@db:5432/volunteerflow
      SESSION_SECRET: replace-me
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:
